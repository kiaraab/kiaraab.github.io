<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiara's Journal</title>
    <link rel="icon" href="assets/images/favicon.jpg">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
    <main class="auth-container">
        <div class="tiara-container">
            <img src="assets/images/tiara.png" alt="Decorative tiara" class="tiara-image">
        </div>
        <div class="welcome-text">
            <h1 class="typing">welcome to kiara's personal archive</h1>
        </div>
        <div class="diary-lock">
            <img src="assets/images/journal.png" alt="Pink diary with heart lock" class="diary-image">
        </div>
        <div class="auth-form">
            <h1>please enter the password ...</h1>
            <div class="password-input">
                <input type="text" id="password" placeholder="• • •" autofocus>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </main>
    <script src="assets/js/auth.js"></script>
</body>
</html>
