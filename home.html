<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Kiara's Journal | Home</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="assets/css/home.css">
</head>
<body>
    <div class="background-container"></div>
    <header class="site-header">
        <div class="tiara-container">
            <img src="assets/images/tiara.png" alt="Decorative tiara" class="tiara-image">
        </div>
        <div class="welcome-text">
            <h1 id="typing-title"></h1>
        </div>
        <div class="filter-container">
            <div class="custom-select-wrapper">
                <select id="type-filter">
                    <option value="all">All Types</option>
                    <option value="book-entry">Books</option>
                    <option value="song-entry">Music</option>
                    <option value="journal-entry">Journal</option>
                </select>
            </div>
            <div class="custom-select-wrapper">
                <select id="month-filter">
                    <option value="all">All Months</option>
                    <option value="2025-09">September 2025</option>
                    <option value="2025-08">August 2025</option>
                </select>
            </div>
        </div>
    </header>

    <main id="magazine-container"></main>

    <div class="pagination-controls">
        <button id="prev-page">Previous</button>
        <button id="next-page">Next</button>
    </div>

    <button id="add-post-btn">+</button>

    <div id="add-post-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>New Post</h2>
            <form id="add-post-form">
                <label for="post-type">Type:</label>
                <select id="post-type" name="type">
                    <option value="journal-entry">Journal</option>
                    <option value="book-entry">Book</option>
                    <option value="song-entry">Song</option>
                </select>
                <label for="post-title">Title:</label>
                <input type="text" id="post-title" name="title" required>
                <label for="post-content">Content:</label>
                <textarea id="post-content" name="content" required></textarea>
                <div class="form-buttons">
                    <button type="submit">Add Post</button>
                    <button type="button" id="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is authenticated
        if (!sessionStorage.getItem('authenticated')) {
            window.location.href = '/';
        }
    </script>
    <script src="assets/js/posts.js"></script>
</body>
</html>
